<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Dark V20 - Template Download</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#e6edf3;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.container{max-width:500px;width:100%;text-align:center}
.logo{font-size:40px;margin-bottom:16px}
h1{font-size:22px;margin-bottom:6px;color:#22c55e}
.version{font-size:13px;color:#8b949e;margin-bottom:30px}
.file-card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:14px;text-align:left;transition:border-color .3s}
.file-card:hover{border-color:#22c55e}
.file-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.file-icon{width:38px;height:38px;background:#1c2333;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.file-icon.xml{color:#f97316}
.file-icon.html{color:#3b82f6}
.file-info h3{font-size:14px;font-weight:600;color:#e6edf3;margin-bottom:2px}
.file-info p{font-size:11px;color:#8b949e}
.dl-btn{display:block;width:100%;padding:12px;background:#22c55e;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s;text-decoration:none}
.dl-btn:hover{background:#16a34a;transform:translateY(-1px)}
.dl-btn:active{transform:translateY(0)}
.note{font-size:11px;color:#6e7681;margin-top:20px;line-height:1.6}
</style>
</head>
<body>
<div class="container">
<div class="logo">🎬</div>
<h1>Cinema Dark V20</h1>
<p class="version">Blogger Template + Sample Posts</p>

<div class="file-card">
<div class="file-header">
<div class="file-icon xml">&#128196;</div>
<div class="file-info">
<h3>cinema-dark-blogger-template.xml</h3>
<p>Blogger Template</p>
</div>
</div>
<button class="dl-btn" onclick="downloadXML()">&#11015; Download XML Template</button>
</div>

<div class="file-card">
<div class="file-header">
<div class="file-icon html">&#128196;</div>
<div class="file-info">
<h3>sample-movie-posts.html</h3>
<p>Sample Movie/Series Posts</p>
</div>
</div>
<button class="dl-btn" onclick="downloadHTML()">&#11015; Download Sample Posts</button>
</div>

<p class="note">
XML = Blogger &gt; Theme &gt; Edit HTML<br>
HTML = Copy post code &gt; Blogger &gt; New Post &gt; HTML View
</p>
</div>

<script>
function downloadFile(filename, content, type){
  var blob = new Blob([content], {type: type});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  setTimeout(function(){
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }, 100);
}
</script>
</body>
</html>
